# Nginx Reverse Proxy for stahovanie.website

# Upstream definitions
upstream frontend_server {
    server frontend:80;
}

upstream wordpress_server {
    server wordpress:80;
}

# HTTP - Redirect all traffic to HTTPS (once certificates are installed)
server {
    listen 80;
    listen [::]:80;
    server_name stahovanie.website www.stahovanie.website;

    # Certbot challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Temporary HTTP configuration (change to redirect to https once Certbot SSL is active)
    location / {
        proxy_pass http://frontend_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WordPress REST API proxying
    location /wp-json/ {
        proxy_pass http://wordpress_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WordPress Admin proxying
    location ~* ^/(wp-admin|wp-login\.php|wp-includes|wp-content|xmlrpc\.php) {
        proxy_pass http://wordpress_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 64M; # For large media uploads in WP
    }
}

